<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing</title>
  <style>

/* ═══════════════════════════════════════════════════════
   BASE RESET & PAGE
   ═══════════════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --accent:        #4f46e5;
  --accent-hover:  #4338ca;
  --accent-light:  #eef2ff;
  --text-main:     #1a1a2e;
  --text-muted:    #6b7280;
  --text-disabled: #9ca3af;
  --border:        #e5e7eb;
  --border-light:  #f3f4f6;
  --bg-page:       #f5f6fa;
  --bg-card:       #ffffff;
  --radius-card:   14px;
  --radius-btn:    8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               Helvetica, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--text-main);
  padding: 64px 20px 80px;
}


/* ═══════════════════════════════════════════════════════
   PAGE HEADER  (outside the export — customise freely)
   ═══════════════════════════════════════════════════════ */

.pt-header {
  text-align: center;
  max-width: 580px;
  margin: 0 auto 52px;
}

.pt-header h1 {
  font-size: 2.25rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}

.pt-header p {
  color: var(--text-muted);
  font-size: 1.05rem;
}


/* ═══════════════════════════════════════════════════════
   PRICING TABLE CONTAINER
   ─ The export wraps everything in .nlic-pricing-table
   ═══════════════════════════════════════════════════════ */

.nlic-pricing-table {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  align-items: stretch;
  max-width: 1120px;
  margin: 0 auto;
}


/* ═══════════════════════════════════════════════════════
   SKU LABEL COLUMN  (.nlic-column-skus)
   ─ Hidden in card layout — each card shows its own labels
   ═══════════════════════════════════════════════════════ */

.nlic-column-skus {
  display: none;
}


/* ═══════════════════════════════════════════════════════
   PLAN CARD  (.nlic-plan-column)
   ─ One card per pricing plan; grows to fill available space
   ═══════════════════════════════════════════════════════ */

.nlic-column.nlic-plan-column {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  flex: 1 1 240px;
  max-width: 320px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.nlic-column.nlic-plan-column:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 36px rgba(0, 0, 0, 0.09);
}


/* ═══════════════════════════════════════════════════════
   COLUMN HEADER
   ═══════════════════════════════════════════════════════ */

.nlic-column-head {
  padding-bottom: 24px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

/* Plan name */
.nlic-plan-name {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}

/* Plan description */
.nlic-plan-description {
  color: var(--text-muted);
  font-size: 0.875rem;
  line-height: 1.55;
  margin-bottom: 18px;
}

/* ── Price block ──────────────────────────────────────── */

.nlic-plan-price {
  display: flex;
  align-items: baseline;
  gap: 5px;
  flex-wrap: wrap;
}

.nlic-plan-price-amount {
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1;
  color: var(--text-main);
}

.nlic-plan-price-currency {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-muted);
}

/*
 * Plans with price 0.00 (Free / Custom / Enterprise).
 * Override per plan using .nlic-column-YOURPLAN .nlic-plan-price-amount::after
 * e.g.  .nlic-column-ENTERPRISE .nlic-plan-price-amount::after { content: "Custom"; }
 */
.nlic-plan-price[data-price="0.00"] .nlic-plan-price-amount {
  font-size: 0;           /* hide the literal "0.00" */
}
.nlic-plan-price[data-price="0.00"] .nlic-plan-price-amount::after {
  content: "Free";        /* default — override per plan if needed */
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-main);
}
.nlic-plan-price[data-price="0.00"] .nlic-plan-price-currency {
  display: none;          /* hide currency label for "Free" plans */
}


/* ═══════════════════════════════════════════════════════
   SKU LIST
   ═══════════════════════════════════════════════════════ */

.nlic-plan-column .nlic-sku-list {
  list-style: none;
  flex-grow: 1;
  margin-bottom: 28px;
}

/* Shared row base */
.nlic-sku-feature,
.nlic-sku-quota {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  font-size: 0.9rem;
  line-height: 1.45;
  border-bottom: 1px solid var(--border-light);
}

.nlic-sku-feature:last-child,
.nlic-sku-quota:last-child {
  border-bottom: none;
}


/* ── FEATURE rows ─────────────────────────────────────── */

/*
 * The empty <div class="nlic-sku-feature-item"> is hidden.
 * The icon is added via ::before on the <li> itself.
 */
.nlic-sku-feature-item {
  display: none;
}

/* ✓ Enabled feature */
.nlic-sku-feature-enabled::before {
  content: "✓";
  color: var(--accent);
  font-weight: 700;
  font-size: 0.9rem;
  flex-shrink: 0;
  margin-top: 1px;
}

/* — Disabled feature */
.nlic-sku-feature-disabled::before {
  content: "—";
  color: var(--text-disabled);
  flex-shrink: 0;
  margin-top: 1px;
}

.nlic-sku-feature-disabled .nlic-sku-description {
  color: var(--text-disabled);
}


/* ── QUOTA rows ───────────────────────────────────────── */

.nlic-sku-quota {
  justify-content: space-between;
}

.nlic-sku-quota .nlic-sku-description {
  color: var(--text-muted);
}

.nlic-sku-quota-item {
  font-weight: 600;
  color: var(--text-main);
  flex-shrink: 0;
}

/* Unlimited (-1) → show ∞ */
.nlic-sku-quota-item[data-value="-1"] {
  font-size: 0;           /* hide literal "-1" */
}
.nlic-sku-quota-item[data-value="-1"]::after {
  content: "∞";
  font-size: 1.1rem;
  color: var(--accent);
}

/* None (0) → show a dash */
.nlic-sku-quota-item[data-value="0"] {
  font-size: 0;
}
.nlic-sku-quota-item[data-value="0"]::after {
  content: "—";
  font-size: 0.9rem;
  color: var(--text-disabled);
}


/* ═══════════════════════════════════════════════════════
   ACTION BUTTON
   ═══════════════════════════════════════════════════════ */

.nlic-action {
  margin-top: auto;
}

.nlic-action-url {
  display: block;
  text-align: center;
  padding: 12px 20px;
  border-radius: var(--radius-btn);
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  border: 1.5px solid var(--border);
  color: var(--text-main);
  background: transparent;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  cursor: pointer;
}

.nlic-action-url:hover {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

/*
 * Default CTA label for plans where the export leaves the link text empty.
 * Override per plan:  .nlic-action-ENTERPRISE .nlic-action-url::after { content: "Contact sales →"; }
 */
.nlic-action-url::after {
  content: "Get started →";
}


/* ═══════════════════════════════════════════════════════
   ATTRIBUTION  (.nlic-attribution)
   ═══════════════════════════════════════════════════════ */

.nlic-attribution {
  width: 100%;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-disabled);
  margin-top: 32px;
}

.nlic-attribution a {
  color: var(--text-muted);
  text-decoration: none;
}

.nlic-attribution a:hover {
  text-decoration: underline;
}


/* ═══════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════ */

@media (max-width: 680px) {
  body { padding: 40px 16px 60px; }

  .pt-header h1 { font-size: 1.75rem; }

  .nlic-column.nlic-plan-column {
    flex: 1 1 100%;
    max-width: 100%;
  }
}

  </style>
</head>
